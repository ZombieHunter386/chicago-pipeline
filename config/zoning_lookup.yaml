# Chicago zone class → development limits.
# Sources: Chicago Zoning Ordinance (Title 17 Municipal Code), Second City Zoning
# (https://secondcityzoning.org). Add new zone classes here as the geography
# expands.
#
# Naming convention for B/C/M/D zones: the digit after the dash is the FAR
# class. -1 = 1.2 FAR, -2 = 2.2 FAR, -3 = 3.0 FAR, -5 = 5.0 FAR. RM zones
# follow a different scale (RM-4.5 → 1.7, RM-5 → 2.0, …, RM-6.5 → 6.6).
# Downtown (DC/DX/DR/DS) FARs vary by parcel and bonuses; we record the
# default allowance with no bonuses applied — actual entitlement may be
# higher.

zones:
  # ============================================================
  # Residential single-family
  # ============================================================
  RS-1:
    max_far: 0.5
    max_height_ft: 30
    max_density: null
    min_lot_area_per_unit: 6250
    setback_front_ft: 20
    setback_side_ft: 4
    setback_rear_ft: 30
    allows_multifamily: false

  RS-2:
    max_far: 0.65
    max_height_ft: 30
    max_density: null
