# Alternative scoring weights — lot_size_sf direction force-flipped to positive.
#
# Rationale: the canonical config/scoring.yaml has lot_size_sf with direction
# "negative" (smaller lots score higher) because that's what the 2006-present
# permit data trained on — most NEW CONSTRUCTION + WRECKING/DEMOLITION events
# in LP/Lakeview happened on standard small residential lots (single-family
# teardowns rebuilt as 2-4 unit multifamily). Consolidation groups, despite
# being in the training set, mostly haven't redeveloped recently — so the
# regression learned that big lots are *less* likely to redevelop.
#
# This alternative inverts that one signal. Use this YAML when you want the
# score to surface large-lot redevelopment opportunities (assemble-then-build
# pattern) instead of small-lot teardown opportunities. All other weights,
# normalization ranges, and significance flags are unchanged from the
# analysis-derived 1.1.0-2026-04-29 run.
#
# To use:
#   .venv/bin/python -m pipeline.score \
#       --db data/full.db \
#       --scoring-yaml config/scoring_alternatives/lot_size_sf_positive.yaml
#
# This OVERWRITES parcels.score and consolidation_groups.score with the
# new score_version. If you want to preserve the canonical scores, copy the
# DB first (cp data/full.db data/full.alt.db) and score against the copy.

