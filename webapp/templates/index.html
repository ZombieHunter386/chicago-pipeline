<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicago Multifamily Pipeline — Review UI</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<div class="top-bar">
  <h1>Chicago Multifamily Pipeline</h1>
  <div class="meta" id="top-bar-meta" aria-live="polite">Score v N/A · loading… · Top 20 shown</div>
</div>

<div class="main">

  <!-- LEFT: Ranked List -->
  <aside class="left-panel" aria-label="Ranked parcels list">
    <div class="panel-header">
      <h2>Ranked Parcels</h2>
      <span class="count-label" id="count-label">— of —</span>
    </div>
    <div class="filter-row" id="stage-pills"></div>
    <div class="search-row" style="padding: 8px 16px; border-bottom:1px solid #30363d;">
      <input type="search" id="address-search" placeholder="Search address…"
             aria-label="Search address"
             style="width:100%; background:#0d1117; color:#c9d1d9; border:1px solid #30363d; border-radius:4px; padding:6px 8px; font-size:12px;" />
    </div>
    <div class="visibility-row" style="padding: 8px 16px; display:flex; gap:12px; align-items:center; border-bottom:1px solid #30363d; flex-wrap:wrap;">
      <label style="color:#8b949e; font-size:11px; display:flex; align-items:center; gap:6px; cursor:pointer;">
        <input type="checkbox" id="include-condo-units" />
        Show individual condo units
      </label>
      <label style="color:#8b949e; font-size:11px; display:flex; align-items:center; gap:6px; cursor:pointer;">
        <input type="checkbox" id="top-n-only" />
        Top 20 Scores only
      </label>
    </div>
    <div class="sort-row" style="padding: 8px 16px; display:flex; gap:6px; align-items:center; border-bottom:1px solid #30363d;">
      <label for="sort-by" style="color:#8b949e; font-size:11px; flex:0 0 auto;">Sort:</label>
      <select id="sort-by" style="flex:1; background:#0d1117; color:#c9d1d9; border:1px solid #30363d; border-radius:4px; padding:4px;">
        <option value="">Default (recently updated)</option>
        <option value="assessed_total">Assessed value</option>
        <option value="estimated_annual_tax">Annual tax</option>
        <option value="lot_size_sf">Lot size</option>
        <option value="year_built">Year built</option>
        <option value="hold_duration_years">Hold duration</option>
        <option value="last_sale_price">Last sale price</option>
        <option value="last_sale_date">Last sale date</option>
        <option value="building_sf">Building SF</option>
        <option value="max_far">Max FAR (by-right)</option>
        <option value="far_gap">FAR gap (×)</option>
        <option value="far_gap_delta">FAR gap (Δ available)</option>
        <option value="max_units_allowed">Max units allowed</option>
        <option value="min_lot_area_per_unit">Min lot area / unit</option>
        <option value="open_violations_count">Open violations</option>
        <option value="years_since_last_permit">Years since permit</option>
        <option value="appeal_count">Appeal count</option>
        <option value="oldest_violation_age_days">Oldest violation age</option>
        <option value="cta_distance_ft">CTA distance</option>
        <option value="condo_unit_count">Condo unit count</option>
        <option value="tax_increase_pct_5yr">Tax increase 5yr</option>
        <option value="land_building_ratio">Land/bldg ratio</option>
        <option value="first_seen_date">First seen</option>
        <option value="last_updated_date">Last updated</option>
        <option value="score">Score</option>
        <option value="address">Address</option>
        <option value="owner_name">Owner name</option>
      </select>
      <button id="sort-dir" type="button" title="Toggle sort direction" aria-label="Toggle sort direction" style="background:#21262d; color:#c9d1d9; border:1px solid #30363d; border-radius:4px; padding:4px 8px; cursor:pointer;">↓</button>
    </div>
    <div class="filter-toggle-row">
      <button class="filter-toggle-btn" id="filter-toggle" aria-expanded="false" aria-controls="filter-panel">
        <span class="arrow" aria-hidden="true">▸</span> Filters <span class="active-filter-count" id="active-filter-count">0</span>
      </button>
      <button class="filter-toggle-btn" id="clear-filters" style="color:#8b949e; font-size:10px;">Clear all</button>
    </div>
    <div class="filter-panel" id="filter-panel"></div>
    <div class="parcel-list" id="parcel-list"></div>
    <div style="padding: 8px 16px; text-align: center; border-bottom: 1px solid #30363d;">
      <button class="btn btn-sm btn-outline" id="load-more" style="width:100%;">Load more</button>
    </div>
  </aside>

  <!-- CENTER: Map -->
  <main class="center-panel">
    <div id="map"></div>
    <div class="layer-toggles">
      <h3>Basemap</h3>
      <label class="layer-toggle"><input type="radio" name="basemap" value="dark" checked> Dark</label>
      <label class="layer-toggle" style="margin-bottom:10px;"><input type="radio" name="basemap" value="satellite"> Satellite</label>
      <h3>Layers</h3>
      <label class="layer-toggle"><input type="checkbox" checked data-layer="top"> <span class="layer-dot" style="background:#238636" aria-hidden="true"></span> Top 20 Scores</label>
      <label class="layer-toggle"><input type="checkbox" checked data-layer="consolidated"> <span class="layer-dot" style="background:#a855f7" aria-hidden="true"></span> Consolidated</label>
      <label class="layer-toggle"><input type="checkbox" checked data-layer="group"> <span class="layer-dot" style="background:transparent; border:2px solid #a855f7;" aria-hidden="true"></span> Group markers</label>
      <label class="layer-toggle"><input type="checkbox" checked data-layer="outreach"> <span class="layer-dot" style="background:#58a6ff" aria-hidden="true"></span> Outreach sent</label>
      <label class="layer-toggle"><input type="checkbox" checked data-layer="other"> <span class="layer-dot" style="background:#f85149" aria-hidden="true"></span> All others</label>
      <h3 style="margin-top:10px;">Overlays</h3>
      <label class="layer-toggle"><input type="checkbox" data-layer="parcel_outlines"> <span class="layer-dot" style="background:transparent; border:1px solid #7dd3fc;" aria-hidden="true"></span> Parcel outlines</label>
      <!-- Address labels (Stadia toner labels) auto-enable when Satellite is selected;
           dark basemap already shows them via OSM, so no manual toggle needed. -->
    </div>
  </main>

  <!-- RIGHT: Detail Panel -->
  <aside class="right-panel" id="detail-panel" aria-label="Parcel details">
    <div class="detail-section" style="color:#8b949e; font-size:12px;">
      Select a parcel to see details.
    </div>
  </aside>
</div>

<script>
  window.FEATURE_OUTREACH = {{ feature_outreach|tojson }};
  window.ESRI_API_KEY = {{ esri_api_key|tojson }};
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- esri-leaflet powers the optional parcel-outlines overlay (Cook County GIS feature server) -->
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
<script src="{{ url_for('static', filename='js/utils.js') }}"></script>
<script src="{{ url_for('static', filename='js/filters.js') }}"></script>
<script src="{{ url_for('static', filename='js/list.js') }}"></script>
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
<script src="{{ url_for('static', filename='js/detail.js') }}"></script>
{% if feature_outreach %}
<script src="{{ url_for('static', filename='js/outreach.js') }}"></script>
{% endif %}
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
